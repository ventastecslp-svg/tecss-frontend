<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECSS</title>

<style>
body { margin:0; font-family: Arial; background:#f3f3f3; }

header {
  background:#131921;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

button {
  background:#ffd814;
  border:none;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>TECSS</h2>
  <button onclick="verCarrito()">🛒 <span id="count">0</span></button>
</header>

<div id="status" style="padding:20px;">Cargando productos...</div>
<div class="grid" id="productos"></div>

<script>
let carrito = [];
let productosGlobal = [];

// 🔥 CARGAR PRODUCTOS SEGURO
async function cargar() {
  try {
    const res = await fetch("https://tecss-slp.onrender.com/productos");

    if (!res.ok) throw new Error("Error en servidor");

    const data = await res.json();

    console.log("DATA:", data);

    if (!Array.isArray(data)) {
      document.getElementById("status").innerText = "Error: datos inválidos";
      return;
    }

    productosGlobal = data;

    document.getElementById("status").innerText = "";

    mostrar(data);

  } catch (error) {
    console.log(error);
    document.getElementById("status").innerText = "Error cargando productos";
  }
}

// 🔥 MOSTRAR PRODUCTOS SEGURO
function mostrar(data){
  const cont = document.getElementById("productos");
  cont.innerHTML = "";

  data.forEach((p, i) => {
    cont.innerHTML += `
      <div class="card">
        <img src="${p.imagen || 'https://via.placeholder.com/200'}" width="100%">
        <h3>${p.nombre || 'Producto'}</h3>
        <p>$${p.precio || 0}</p>
        <button onclick="agregar(${i})">Agregar</button>
      </div>
    `;
  });
}

// 🛒 AGREGAR SEGURO
function agregar(index){
  const p = productosGlobal[index];
  if (!p) return;

  carrito.push(p);
  document.getElementById("count").innerText = carrito.length;
}

// 👀 CARRITO
function verCarrito(){
  alert("Productos en carrito: " + carrito.length);
}

// 🚀 INICIAR
cargar();
</script>

</body>
</html>
